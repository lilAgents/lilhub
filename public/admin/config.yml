# Sveltia CMS configuration for your lilHub.
#
# Local development (no proxy server needed):
#   1. Start Astro: pnpm dev
#   2. Open http://localhost:4321/admin in a Chromium browser (Chrome, Edge,
#      or Brave; Firefox and Safari are not supported).
#   3. Click "Work with Local Repository" and pick this project's root folder.
#   Sveltia uses the browser File System Access API to read and write your real
#   files directly, so saves go straight to src/content/profile.json.
#
# Note: Sveltia ignores local_backend for its local workflow (the button above
# is what triggers local editing). It is kept here so the same config behaves
# for Decap-compatible tooling too.

local_backend: true

backend:
  name: github
  # The "Deploy to Netlify" build rewrites this to YOUR own repo automatically
  # (scripts/set-cms-repo.mjs reads Netlify's REPOSITORY_URL at build time).
  # Until then it is a placeholder; local editing uses local_backend above.
  repo: owner/repo
  branch: main
  # Production GitHub sign-in goes through the shared lilAgents auth broker (a
  # Cloudflare Worker on the team account, custom domain auth.lilhub.me). Every
  # deployed lilHub points here.
  base_url: https://auth.lilhub.me

# Avatar and any other uploads land in public/uploads. media_folder is the
# real on-disk path; public_folder is the URL the site serves them from.
media_folder: public/uploads
public_folder: /uploads

collections:
  - name: profile
    label: Profile
    # The preview pane just echoes the fields and adds little here, so turn it
    # off for a cleaner, single-column editor.
    editor:
      preview: false
    delete: false
    files:
      - name: profile
        label: Profile
        # Path is relative to the repo root and matches where the Astro page
        # imports the data from (src/content/profile.json).
        file: src/content/profile.json
        fields:
          - { name: name, label: Name, widget: string }
          - name: description
            label: Description
            widget: markdown
            minimal: true
            buttons: [bold, italic, link]
            editor_components: []
          - { name: avatar, label: Profile Picture, widget: image }
          - {
              name: showAttribution,
              label: "Show lilHub branding (footer and share image)",
              widget: boolean,
              default: true,
              required: false,
            }
          - name: theme
            label: Theme Colors
            widget: object
            fields:
              - { name: primary, label: Primary Color, widget: string }
              - { name: secondary, label: Secondary Color, widget: string }
              - { name: background, label: Background Color, widget: string }
              - { name: text, label: Text Color, widget: string }
          - name: links
            label: Links
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: Title, widget: string }
              - { name: subtitle, label: Subtitle, widget: string, required: false }
              - { name: url, label: URL, widget: string }
              - name: icon
                label: Icon
                widget: select
                # Generic glyphs map to Lucide, brand names to brand logos.
                # Any value still renders via the forgiving resolver in
                # src/components/Icon.astro (unknown names fall back to "link").
                options:
                  - globe
                  - mail
                  - calendar-days
                  - link
                  - store
                  - map-pin
                  - phone
                  - book-open
                  - instagram
                  - youtube
                  - x-twitter
                  - linkedin
                  - tiktok
                  - github
                  - facebook
                  - spotify
                  - discord
                  - twitch
                  - substack
                  - threads
                  - bluesky
                  - pinterest
                  - soundcloud
                  - patreon
                  - reddit
                  - apple
                  - mastodon
          - { name: metaTitle, label: "Meta Title (leave blank to use your name + lilHub)", widget: string, required: false }
          - { name: metaDescription, label: "Meta Description (leave blank to use your bio above)", widget: text, required: false }
